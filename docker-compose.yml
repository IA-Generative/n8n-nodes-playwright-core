services:
  n8n:
    build: .
    image: n8n-playwright-core
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - N8N_LOG_LEVEL=debug
      - N8N_LOG_OUTPUT=console
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_CUSTOM_EXTENSIONS=/opt/custom-nodes
      - N8N_PLAYWRIGHT_NODE_PROTOCOLS=[]
      - N8N_PLAYWRIGHT_NODE_CUSTOM_SCRIPT_ENABLED=false

      # Proxy configuration read by the custom Playwright node
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - ALL_PROXY=http://proxy:8080
      - NO_PROXY=localhost,127.0.0.1,n8n,playwright,claim-controller,claim-controller-mock,claim-controller-mock:8080
      - http_proxy=http://proxy:8080
      - https_proxy=http://proxy:8080
      - all_proxy=http://proxy:8080
      - no_proxy=localhost,127.0.0.1,n8n,playwright,claim-controller,claim-controller-mock,claim-controller-mock:8080
    develop:
      watch:
        - action: rebuild
          path: ./nodes
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_cache:/home/node/.cache

  playwright:
    image: ghcr.io/ia-generative/playwright:v1.58.2-jammy
    build:
      dockerfile: Dockerfile-playwright
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile-playwright
    environment:
      - DEBUG=pw:server,pw:protocol,pw:api

  proxy:
    image: mitmproxy/mitmproxy:latest
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./mitm-scripts:/scripts
      - mitm-certs:/home/mitmproxy/.mitmproxy
    command: >
      mitmweb
      --web-host 0.0.0.0
      --web-port 8081
      --listen-port 8080
      --scripts /scripts/mock_responses.py
      --ssl-insecure
      --set web_password=dev

  claim:
    image: node:22-alpine
    command: node /app/server.js
    volumes:
      - ./claim-mock:/app

volumes:
  n8n_data:
  n8n_cache:
  mitm-certs: