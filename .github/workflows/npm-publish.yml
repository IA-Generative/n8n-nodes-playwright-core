name: Publier sur GitHub Package Registry

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js avec GitHub Package Registry
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ia-generative'

      - name: Activation de corepack et pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.1.4 --activate

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build du projet
        run: pnpm build

      - name: Vérification cohérence version tag / package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag Git    : $TAG_VERSION"
          echo "package.json : $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ La version du tag ($TAG_VERSION) ne correspond pas à celle du package.json ($PKG_VERSION)."
            echo "Mettez à jour la version dans package.json avant de créer le tag."
            exit 1
          fi
          echo "✅ Versions cohérentes : $PKG_VERSION"

      - name: Publication sur GitHub Package Registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Création de la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 📦 Installation

            ### Prérequis : authentification GitHub Package Registry

            ```bash
            npm config set @ia-generative:registry https://npm.pkg.github.com
            npm config set //npm.pkg.github.com/:_authToken YOUR_GITHUB_TOKEN
            ```

            > Le token GitHub doit avoir le scope `read:packages`.

            ### Installation du node n8n

            ```bash
            npm install @ia-generative/n8n-nodes-playwright-core@${{ github.ref_name }}
            ```

            ### Utilisation dans un Dockerfile n8n

            ```dockerfile
            FROM n8nio/n8n:latest

            USER root

            ARG GITHUB_TOKEN

            RUN npm config set @ia-generative:registry https://npm.pkg.github.com \
                && npm config set //npm.pkg.github.com/:_authToken ${GITHUB_TOKEN} \
                && cd /usr/local/lib \
                && npm install @ia-generative/n8n-nodes-playwright-core@${{ github.ref_name }} \
                && npm config delete //npm.pkg.github.com/:_authToken

            USER node
            ```
