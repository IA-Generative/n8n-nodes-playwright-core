<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="white"/>

  <!-- Main claim rectangle -->
  <rect x="150" y="120" width="724" height="220" rx="35" ry="35" fill="#1a3050"/>

  <!-- Orange dot top-left of claim box -->
  <circle cx="205" cy="175" r="28" fill="#FF6B00"/>

  <!-- "claim" text -->
  <text x="512" y="265" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">claim</text>

  <!-- Bottom feet of claim box (two rounded connectors going down) -->
  <!-- Left foot -->
  <path d="M 150 300 Q 150 340 190 340 L 310 340 Q 350 340 350 300" fill="#1a3050"/>
  <!-- Right foot -->
  <path d="M 674 300 Q 674 340 714 340 L 834 340 Q 874 340 874 300" fill="#1a3050"/>

  <!-- Connector lines (org chart) -->
  <!-- Vertical line from center top -->
  <line x1="512" y1="340" x2="512" y2="420" stroke="#1a3050" stroke-width="8" stroke-linecap="round"/>
  <!-- Horizontal line -->
  <line x1="210" y1="420" x2="814" y2="420" stroke="#1a3050" stroke-width="8" stroke-linecap="round"/>
  <!-- Vertical line to left box -->
  <line x1="210" y1="420" x2="210" y2="490" stroke="#1a3050" stroke-width="8" stroke-linecap="round"/>
  <!-- Vertical line to center box -->
  <line x1="512" y1="420" x2="512" y2="490" stroke="#1a3050" stroke-width="8" stroke-linecap="round"/>
  <!-- Vertical line to right box -->
  <line x1="814" y1="420" x2="814" y2="490" stroke="#1a3050" stroke-width="8" stroke-linecap="round"/>

  <!-- LEFT sub-box -->
  <rect x="60" y="490" width="300" height="340" rx="40" ry="40" fill="white" stroke="#1a3050" stroke-width="8"/>
  <!-- Orange shape left box: top-left organic blob -->
  <clipPath id="clipLeft">
    <rect x="60" y="490" width="300" height="340" rx="40" ry="40"/>
  </clipPath>
  <g clip-path="url(#clipLeft)">
    <!-- top-left orange -->
    <ellipse cx="130" cy="590" rx="130" ry="120" fill="#FF6B00"/>
    <!-- bottom-right orange -->
    <ellipse cx="310" cy="760" rx="100" ry="90" fill="#FF6B00"/>
    <!-- white divider wave -->
    <path d="M 60 650 Q 160 580 360 690 L 360 830 L 60 830 Z" fill="white"/>
  </g>

  <!-- CENTER sub-box -->
  <rect x="362" y="490" width="300" height="340" rx="40" ry="40" fill="white" stroke="#1a3050" stroke-width="8"/>
  <clipPath id="clipCenter">
    <rect x="362" y="490" width="300" height="340" rx="40" ry="40"/>
  </clipPath>
  <g clip-path="url(#clipCenter)">
    <!-- bottom orange large -->
    <ellipse cx="480" cy="760" rx="150" ry="130" fill="#FF6B00"/>
    <!-- left orange -->
    <ellipse cx="370" cy="630" rx="80" ry="70" fill="#FF6B00"/>
    <!-- white divider -->
    <path d="M 362 490 L 662 490 L 662 650 Q 530 590 362 670 Z" fill="white"/>
  </g>

  <!-- RIGHT sub-box -->
  <rect x="664" y="490" width="300" height="340" rx="40" ry="40" fill="white" stroke="#1a3050" stroke-width="8"/>
  <clipPath id="clipRight">
    <rect x="664" y="490" width="300" height="340" rx="40" ry="40"/>
  </clipPath>
  <g clip-path="url(#clipRight)">
    <!-- top-right orange -->
    <ellipse cx="870" cy="590" rx="130" ry="120" fill="#FF6B00"/>
    <!-- bottom-left orange -->
    <ellipse cx="690" cy="760" rx="100" ry="90" fill="#FF6B00"/>
    <!-- white divider wave -->
    <path d="M 964 650 Q 864 580 664 690 L 664 830 L 964 830 Z" fill="white"/>
  </g>

</svg>