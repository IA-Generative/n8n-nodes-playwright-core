name: Publier sur npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Configuration de Node.js avec npm
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Activation de corepack et pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build du projet
        run: pnpm build

      - name: Vérification cohérence version tag / package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag Git    : $TAG_VERSION"
          echo "package.json : $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ La version du tag ($TAG_VERSION) ne correspond pas à celle du package.json ($PKG_VERSION)."
            echo "Mettez à jour la version dans package.json avant de créer le tag."
            exit 1
          fi
          echo "✅ Versions cohérentes : $PKG_VERSION"

      - name: Publication sur npm
        run: npm publish --provenance --access public

      - name: Création de la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 📦 Installation

            ### Installation du node n8n

            ```bash
            npm install n8n-nodes-playwright-core@${{ github.ref_name }}
            ```

            ### Utilisation dans un Dockerfile n8n

            ```dockerfile
            FROM n8nio/n8n:latest

            USER root

            RUN cd /home/node/.n8n/nodes \
                && npm install n8n-nodes-playwright-core@${{ github.ref_name }}

            USER node
            ```
